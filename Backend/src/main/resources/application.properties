server.port=8080
spring.application.name=TASKMANAGER
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Serialize LocalDateTime as ISO string instead of array
spring.jackson.serialization.write-dates-as-timestamps=false

# DB and JWT values come from the active profile or environment variables
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
cors.allowed-origin=${CORS_ALLOWED_ORIGIN}
cookie.secure=${COOKIE_SECURE:false}

# Mail
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_USERNAME}
app.admin.email=${ADMIN_EMAIL}

# Logging — production default, only warnings and errors
logging.level.com.example.taskmanager=INFO
logging.level.org.springframework=WARN
