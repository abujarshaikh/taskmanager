server.port=8080
spring.application.name=TASKMANAGER
spring.jpa.hibernate.ddl-auto=validate
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.show-sql=true  — enable in dev profile only, not production

# DB and JWT values come from the active profile or environment variables
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
cors.allowed-origin=${CORS_ALLOWED_ORIGIN}
cookie.secure=${COOKIE_SECURE:false}

# Logging — production default, only warnings and errors
logging.level.com.example.taskmanager=INFO
logging.level.org.springframework=WARN
