# Production profile — all values injected via environment variables on EC2
# spring.jpa.hibernate.ddl-auto is intentionally kept as 'validate' (set in application.properties)
# to prevent accidental schema changes in production.

# Use 'update' only the very first deployment to create tables, then switch back to 'validate'.
spring.jpa.hibernate.ddl-auto=validate

# Show SQL is off in prod
spring.jpa.show-sql=false
logging.level.com.example.taskmanager=INFO
logging.level.org.springframework=WARN
