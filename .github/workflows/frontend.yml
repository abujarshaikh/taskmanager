name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "Frontend/**"
      - ".github/workflows/frontend.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Frontend/Task_Management/package-lock.json

      - name: Install dependencies
        working-directory: Frontend/Task_Management
        run: npm ci

      - name: Build
        working-directory: Frontend/Task_Management
        env:
          # Point the production build at the EC2 backend via CloudFront or direct
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_ADMIN_EMAIL: ${{ secrets.VITE_ADMIN_EMAIL }}
          VITE_ADMIN_PHONE: ${{ secrets.VITE_ADMIN_PHONE }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync dist to S3
        run: |
          aws s3 sync Frontend/Task_Management/dist/ \
            s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"

          # index.html must NOT be long-cached (SPA entry point)
          aws s3 cp Frontend/Task_Management/dist/index.html \
            s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
