name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "Backend/**"
      - ".github/workflows/backend.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build JAR (skip tests)
        working-directory: Backend
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests -q

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}        # e.g. ec2-user
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}  # private key PEM contents
        run: |
          echo "$EC2_SSH_KEY" > key.pem
          chmod 600 key.pem

          # Copy the fat JAR
          scp -i key.pem -o StrictHostKeyChecking=no \
            Backend/target/taskmanager-*.jar \
            $EC2_USER@$EC2_HOST:/opt/taskmanager/app.jar

          # Restart the systemd service
          ssh -i key.pem -o StrictHostKeyChecking=no \
            $EC2_USER@$EC2_HOST \
            "sudo systemctl restart taskmanager"

          rm -f key.pem
